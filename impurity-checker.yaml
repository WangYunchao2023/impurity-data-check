# ============================================================
# HPLC 有关物质检查器 - 全局配置文件
# 版本: 0.8.0
# ============================================================
# 放置位置（skill 目录）：
#   ~/.openclaw/workspace/skills/impurity-data-check/impurity-checker.yaml
#
# 阈值优先级（从高到低）：
#   1. --threshold 命令行参数（全局单一阈值）
#   2. 配置文件 default_threshold / impurity_thresholds
#   3. Excel 表头自动识别
#   4. 内置默认值 0.05%
# ============================================================

# ── 默认报告限（未匹配到杂质专用阈值时使用） ──
default_threshold: 0.05

# ── 按杂质名称设置不同报告限 ──
# 匹配规则：精确匹配 > 包含匹配
# 即：先找完全相同的名称，再找杂质名包含 key 的
impurity_thresholds:
  # 已知杂质（精确名称匹配）
  "杂质M": 0.05
  "杂质N": 0.10

  # 其他单个杂质（包含匹配）
  "其他单个杂质": 0.05

  # 示例：特定药物项目
  # "甲硝唑杂质A": 0.10
  # "甲硝唑杂质B": 0.05
