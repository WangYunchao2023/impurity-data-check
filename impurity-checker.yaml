# ============================================================
# HPLC 有关物质检查器 - 全局配置文件
# ============================================================
# 放置位置（skill 目录）：
#   ~/.openclaw/workspace/skills/impurity-data-check/impurity-checker.yaml
#
# 阈值优先级（从高到低）：
#   1. --threshold 命令行参数
#   2. 项目级配置（project_overrides 中匹配当前文件路径/项目编号）
#   3. 默认配置（default_threshold）
# ============================================================

# ── 默认报告限（所有项目统一使用此阈值时设置） ──
default_threshold: 0.05

# ── 项目级阈值覆盖（按项目编号或文件路径匹配） ──
# 匹配方式：文件中包含 key 则使用对应的 threshold
# 示例：
#   - 项目编号 "LMS002" → 使用 0.06%
#   - 文件路径包含 "黄体酮" → 使用 0.05%
#   - 任意自定义关键词
project_overrides:
  # LMS002 项目（黄体酮预灌封），报告限 0.05%
  "LMS002": 0.05

  # 其他项目示例：
  # "LMS001": 0.10
  # "黄体酮": 0.05
  # "/研发部门/抗肿瘤药/": 0.10
